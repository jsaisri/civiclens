# Alembic configuration file for CivicLens

[alembic]
# Path to migration scripts
script_location = database/migrations

# Database URL — reads from environment variable
# Set DATABASE_URL in your .env file
sqlalchemy.url = mysql+pymysql://root:@localhost:3306/civiclens

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
